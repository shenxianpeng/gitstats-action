name: Test GitStats Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Basic smoke test — default inputs
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitStats Action
        uses: ./
        with:
          output: gitstats-report

      - name: Verify Report Generated
        run: |
          test -f gitstats-report/index.html && echo "✅ smoke: index.html found"
          test -f gitstats-report/activity.html && echo "✅ smoke: activity.html found"
          test -f gitstats-report/authors.html && echo "✅ smoke: authors.html found"

      - name: Upload Smoke Artifact
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report
          path: gitstats-report/

  # Dogfooding — exercise every meaningful input
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Dogfood GitStats Action
        uses: ./
        id: dogfood
        with:
          path: .
          output: dogfood-report
          project_name: GitStats Action Dogfood
          commit_begin: '10'
          config: max_authors=5,exclude_exts=png,jpg,gif,svg

      - name: Verify Dogfood Output
        run: |
          echo "Report path output: ${{ steps.dogfood.outputs.report_path }}"
          test "${{ steps.dogfood.outputs.report_path }}" = "dogfood-report" \
            && echo "✅ dogfood: report_path output correct"

          test -f dogfood-report/index.html && echo "✅ dogfood: index.html found"
          test -f dogfood-report/authors.html && echo "✅ dogfood: authors.html found"

          # project_name should appear in the report
          grep -q "GitStats Action Dogfood" dogfood-report/index.html \
            && echo "✅ dogfood: project_name appears in report" \
            || { echo "❌ dogfood: project_name missing"; exit 1; }

          # Only last 10 commits
          echo "Total commits in repo: $(git rev-list --count HEAD)"
          echo "Dogfood report generated with commit_begin=10"

      - name: Upload Dogfood Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dogfood-report
          path: dogfood-report/

  # Cross-platform: windows + macos
  cross-platform:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitStats Action (${{ matrix.os }})
        uses: ./
        with:
          output: gitstats-report

      - name: Verify Report Generated
        shell: bash
        run: |
          test -f gitstats-report/index.html && echo "✅ ${{ matrix.os }}: index.html found"

      - name: Upload ${{ matrix.os }} Artifact
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ matrix.os }}
          path: gitstats-report/
