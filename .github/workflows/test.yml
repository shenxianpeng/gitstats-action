name: Test GitStats Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitStats Action
        uses: ./
        with:
          output: gitstats-report

      - name: Verify Report Generated
        run: |
          echo "Checking generated report..."
          ls -la gitstats-report/
          test -f gitstats-report/index.html && echo "✅ index.html found"
          test -f gitstats-report/index.html || (echo "❌ index.html missing" && exit 1)

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitstats-report
          path: gitstats-report/
