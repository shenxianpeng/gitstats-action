name: 'GitStats Action'
description: 'Generate insightful visual reports from Git repositories'
author: 'Xianpeng Shen'
branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  path:
    description: 'Path to the git repository'
    required: false
    default: '.'
  output:
    description: 'Output directory for the generated statistics report'
    required: false
    default: 'gitstats-report'
  commit_begin:
    description: 'Start of commit range (e.g. 10 for last 10 commits). Passed as -c commit_begin=...'
    required: false
    default: ''
  commit_end:
    description: 'End of commit range (default: HEAD). Passed as -c commit_end=...'
    required: false
    default: ''
  start_date:
    description: 'Starting date for commits (YYYY-MM-DD). Passed as -c start_date=...'
    required: false
    default: ''
  end_date:
    description: 'Ending date for commits (YYYY-MM-DD). Passed as -c end_date=...'
    required: false
    default: ''
  project_name:
    description: 'Project name to display (default: repo directory name). Passed as -c project_name=...'
    required: false
    default: ''
  config:
    description: 'Additional gitstats config overrides (pipe-separated key=value), e.g. "max_authors=10|exclude_exts=png,jpg"'
    required: false
    default: ''
  ai_enabled:
    description: 'Enable AI-powered summaries in reports'
    required: false
    default: 'false'
  ai_provider:
    description: 'AI provider: openai, claude, gemini, ollama'
    required: false
    default: ''
  ai_model:
    description: 'AI model (e.g., gpt-4o, claude-sonnet-4-20250514)'
    required: false
    default: ''

outputs:
  report_path:
    description: 'Path to the generated report'
    value: ${{ steps.gitstats.outputs.report_path }}

runs:
  using: 'composite'
  steps:
    - name: Install GitStats
      shell: bash
      run: |
        if ! command -v gitstats &>/dev/null; then
          pip install gitstats
        fi

    - name: Run GitStats
      id: gitstats
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_COMMIT_BEGIN: ${{ inputs.commit_begin }}
        INPUT_COMMIT_END: ${{ inputs.commit_end }}
        INPUT_START_DATE: ${{ inputs.start_date }}
        INPUT_END_DATE: ${{ inputs.end_date }}
        INPUT_PROJECT_NAME: ${{ inputs.project_name }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_AI_ENABLED: ${{ inputs.ai_enabled }}
        INPUT_AI_PROVIDER: ${{ inputs.ai_provider }}
        INPUT_AI_MODEL: ${{ inputs.ai_model }}
      run: |
        set -e

        REPO_PATH="${INPUT_PATH:-.}"
        OUTPUT_DIR="${INPUT_OUTPUT:-gitstats-report}"

        # Build config overrides
        GT_OPTS=""

        if [ -n "${INPUT_COMMIT_BEGIN}" ]; then
          GT_OPTS="$GT_OPTS -c commit_begin=${INPUT_COMMIT_BEGIN}"
        fi
        if [ -n "${INPUT_COMMIT_END}" ]; then
          GT_OPTS="$GT_OPTS -c commit_end=${INPUT_COMMIT_END}"
        fi
        if [ -n "${INPUT_START_DATE}" ]; then
          GT_OPTS="$GT_OPTS -c start_date=${INPUT_START_DATE}"
        fi
        if [ -n "${INPUT_END_DATE}" ]; then
          GT_OPTS="$GT_OPTS -c end_date=${INPUT_END_DATE}"
        fi
        if [ -n "${INPUT_PROJECT_NAME}" ]; then
          GT_OPTS="$GT_OPTS -c project_name=${INPUT_PROJECT_NAME}"
        fi

        # Additional config overrides (pipe-separated key=value pairs)
        if [ -n "${INPUT_CONFIG}" ]; then
          IFS='|' read -ra PAIRS <<< "${INPUT_CONFIG}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)  # trim whitespace
            [ -n "$pair" ] && GT_OPTS="$GT_OPTS -c $pair"
          done
        fi

        # AI options
        if [ "${INPUT_AI_ENABLED}" = "true" ]; then
          GT_OPTS="$GT_OPTS --ai"
        fi
        if [ -n "${INPUT_AI_PROVIDER}" ]; then
          GT_OPTS="$GT_OPTS --ai-provider ${INPUT_AI_PROVIDER}"
        fi
        if [ -n "${INPUT_AI_MODEL}" ]; then
          GT_OPTS="$GT_OPTS --ai-model ${INPUT_AI_MODEL}"
        fi

        echo "Repository: $REPO_PATH"
        echo "Output dir: $OUTPUT_DIR"
        echo "Options: $GT_OPTS"

        gitstats $GT_OPTS "$REPO_PATH" "$OUTPUT_DIR"

        echo ""
        echo "📊 GitStats report generated successfully!"
        echo "::notice title=GitStats Report::Open $OUTPUT_DIR/index.html to view the report."

        echo "report_path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
